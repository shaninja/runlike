language: python
dist: jammy
python:
  - "3.8"
services:
  - docker
env:
  global:
    - DOCKER_API_VERSION=1.44

before_install:
  - ./tools/install_pinned_docker.sh
install:
  - pip install "poetry<2"
  - poetry install
before_script:
  - python --version
  - poetry --version
  - docker version
  - poetry run python tools/verify_docker_target.py
script:
  - make test
  - make test-probes-p0
after_failure:
  - ./inspect_fixtures.sh
after_success:
  - |
    if [[ "$TRAVIS_REPO_SLUG" == "lavie/runlike" && "$TRAVIS_BRANCH" == "master" && "$TRAVIS_PULL_REQUEST" == "false" ]]; then
      echo "$DOCKERHUB_PASSWORD" | docker login -u assaflavie --password-stdin
      make pypi push
    fi
